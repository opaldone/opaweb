{{ define "_vidlist" }}
  {{ $vidlist := (index . "vidlist")}}
  {{ $uqroom := (index . "uqroom") }}
  <div class="ws-st-cone">
    <div class="ws-st-he">
      <span class="ws-st-he-lbl">
        {{ re "Meeting recordings" }}
      </span>
    </div>
    <ul id="list-vid" class="ws-st-data-list">
      {{ range $vidlist }}
        <li class="list-vid-li clearfix">
          <a class="li-st-link" href="{{ .Link }}" target="_blank" title="Play video">
            <span class="li-st-ico">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"><path stroke="#979797" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 17.259V6.741a1 1 0 0 1 1.504-.864l9.015 5.26a1 1 0 0 1 0 1.727l-9.015 5.259A1 1 0 0 1 7 17.259Z"/></svg>
            </span>
            <span class="li-st-dt">{{ .Dt }}</span>
            <span class="li-st-tm">{{ .Tm }}</span>
            <span class="li-st-sz">{{ .Sz }}</span>
          </a>
          <div class="li-st-btns">
            <a class="lib-hre" download="{{ .Filename }}" href="{{ .Link }}" title="Download video">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24"><path stroke="#fff" stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 5v8.5m0 0 3-3m-3 3-3-3M5 15v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2"/></svg>
            </a>
            <span class="delvid lib-hre" title="Delete video"
              data-roo="{{ $uqroom }}"
              data-fn="{{ .Filename }}"
              data-hre="{{ ro ("vi_del_vid") }}"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24"><g stroke="#ff5511" stroke-width="2"><path stroke-linecap="round" d="m9 15 6-6m0 6L9 9"/></g></svg>
            </span>
          </div>
        </li>
      {{ end }}
    </ul>
  </div>
{{ end }}
